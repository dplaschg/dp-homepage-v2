<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daniel Plaschg — Growth Consultant</title>
  <meta name="description" content="Growth consultant. Say hi." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@200;300&family=JetBrains+Mono:wght@400&display=swap" />
  <style>
    :root {
      --bg: #0a0e1f;
      --accent: #67e8f9;
      --accent-dim: rgba(103, 232, 249, 0.7);
      --accent-faint: rgba(103, 232, 249, 0.06);
      --device-bg: #10172b;
      --device-border: rgba(103, 232, 249, 0.33);
      --device-glow: rgba(103, 232, 249, 0.13);
      --font-display: "Inter Tight", ui-sans-serif, system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--accent);
      font-family: var(--font-display);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .stage {
      width: min(420px, 88vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
      position: relative;
    }

    .logo {
      width: 44px;
      height: 32px;
      color: var(--accent);
    }

    .logo svg { width: 100%; height: 100%; display: block; }

    .name {
      font-family: var(--font-display);
      font-weight: 200;
      font-size: clamp(28px, 4.2vw, 38px);
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: var(--accent);
    }

    .tagline {
      font-family: var(--font-mono);
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: var(--accent-dim);
      text-transform: lowercase;
    }

    .microcopy {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 14px;
      line-height: 1.5;
      color: var(--accent-dim);
      max-width: 280px;
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="logo" aria-label="Daniel Plaschg">
      <svg viewBox="0 0 44 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <text x="22" y="25" text-anchor="middle" font-family='"Inter Tight", ui-sans-serif, sans-serif' font-weight="200" font-size="26" letter-spacing="-1" fill="currentColor">DP</text>
      </svg>
    </div>
    <h1 class="name">Daniel Plaschg</h1>
    <p class="tagline">growth_consultant</p>
    <p class="microcopy">Say hi — drop me a line whenever.</p>
  </main>
  <script></script>
</body>
</html>
